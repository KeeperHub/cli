name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.txt ./...
      - name: Build binary (CGO_ENABLED=0)
        run: CGO_ENABLED=0 go build -o bin/kh ./cmd/kh
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check docs are up to date
        run: |
          cd docs && go generate
          git diff --exit-code docs/
  integration-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests
        env:
          KH_TEST_HOST: ${{ secrets.KH_TEST_HOST }}
          KH_TEST_EMAIL: ${{ secrets.KH_TEST_EMAIL }}
          KH_TEST_PASSWORD: ${{ secrets.KH_TEST_PASSWORD }}
          KH_API_KEY: ${{ secrets.KH_API_KEY }}
        run: go test -tags integration -v ./tests/integration/...
