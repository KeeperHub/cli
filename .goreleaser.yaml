version: 2
before:
  hooks:
    - ./scripts/completions.sh
builds:
  - main: ./cmd/kh
    binary: kh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/keeperhub/cli/internal/version.Version={{.Version}}
archives:
  - format: tar.gz
    name_template: "kh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - completions/*
nfpms:
  - id: kh
    package_name: kh
    vendor: KeeperHub
    homepage: "https://github.com/keeperhub/cli"
    description: "KeeperHub CLI -- manage workflows, executions, and Web3 automation"
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: completions/kh.bash
        dst: /usr/share/bash-completion/completions/kh
      - src: completions/kh.zsh
        dst: /usr/share/zsh/vendor-completions/_kh
      - src: completions/kh.fish
        dst: /usr/share/fish/vendor_completions.d/kh.fish
checksum:
  name_template: checksums.txt
homebrew_casks:
  - name: kh
    repository:
      owner: keeperhub
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/keeperhub/cli"
    description: "KeeperHub CLI -- manage workflows, executions, and Web3 automation"
    license: MIT
    completions:
      bash: "completions/kh.bash"
      zsh: "completions/kh.zsh"
      fish: "completions/kh.fish"
