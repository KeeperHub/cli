version: 2
before:
  hooks:
    - ./scripts/completions.sh
builds:
  - main: ./cmd/kh
    binary: kh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/keeperhub/cli/internal/version.Version={{.Version}}
archives:
  - format: tar.gz
    name_template: "kh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - completions/*
checksum:
  name_template: checksums.txt
homebrew_casks:
  - repository:
      owner: keeperhub
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/keeperhub/cli"
    description: "KeeperHub CLI -- manage workflows, executions, and Web3 automation"
    license: MIT
    completions:
      bash: "completions/kh.bash"
      zsh: "completions/kh.zsh"
      fish: "completions/kh.fish"
    test: |
      system "#{bin}/kh version"
