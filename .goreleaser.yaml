version: 2
builds:
  - main: ./cmd/kh
    binary: kh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/keeperhub/cli/internal/version.Version={{.Version}}
archives:
  - format: tar.gz
    name_template: "kh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: checksums.txt
