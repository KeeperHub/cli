version: "2"
linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - errcheck
formatters:
  enable:
    - gofmt
